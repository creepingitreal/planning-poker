modules:
  jira:issuePanel:
    - key: procode-poker-panel
      title: Procode Poker
      layout: basic
      resource: main
      resolver:
        function: resolver
      viewportSize: medium
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/procode-deploy/build

permissions:
  scopes:
    - read:jira-work
  external:
    fetch:
      backend:
        - https://procode-planning-poker.onrender.com
    frames:
      - https://procode-planning-poker.onrender.com

app:
  runtime:
    name: nodejs24.x
  id: ari:cloud:ecosystem::app/88383d6d-1877-46cf-b70f-b89b81fa17a0