modules:
  jira:issuePanel:
    - key: procode-poker-panel
      title: Procode Poker
      layout: basic
      resource: main
      resolver:
        function: resolver
      viewportSize: medium
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/procode-deploy/build
permissions:
  scopes:
    - read:jira-work
  external:
    fetch:
      backend:
        - https://procode-planning-poker.onrender.com
    frames:
      - https://procode-planning-poker.onrender.com
app:
  runtime:
    name: nodejs24.x
  id: ari:cloud:ecosystem::app/b483dee6-9319-490a-a10c-471fbfc283b6


  #  npx @forge/cli deploy
  #  npx @forge/cli install --site yourcompany.atlassian.net