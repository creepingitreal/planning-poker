<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procode Poker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 600px; border: none; display: block; }
    </style>
</head>
<body>
<iframe id="poker-frame" src=""></iframe>
<script>
    // Use AP to get the Jira issue context
    AP.context.getContext((context) => {
        const issueKey = context.jira.issue.key;
        document.getElementById('poker-frame').src =
            `https://YOUR_HOSTED_APP_URL/?issue=${issueKey}`; // TODO: REPLACE WITH HOSTED URL
    });
</script>
</body>
</html>
