modules:
  jira:issuePanel:
    - key: procode-poker-panel
      title: Procode Poker
      layout: basic
      resource: main
      resolver:
        function: resolver
      viewportSize: medium
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
    tunnel:
      port: 5173
permissions:
  scopes:
    - read:jira-work
  external:
    fetch:
      backend:
        - YOUR_HOSTED_APP_URL  # TODO Replace with hosted url
    styles:
      - unsafe-inline
    scripts:
      - unsafe-inline
    frames:
      - YOUR_HOSTED_APP_URL    # TODO Replace with hosted url
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/b483dee6-9319-490a-a10c-471fbfc283b6


  # TODO: Once both urls are updated, deploy forge app to procode
  #  npx @forge/cli deploy
  #  npx @forge/cli install --site yourcompany.atlassian.net