modules:
  jira:issuePanel:
    - key: procode-poker-hello-world-panel
      resource: main
      resolver:
        function: resolver
      viewportSize: medium
      title: Procode Poker
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/hello-world/build
permissions:
  scopes:
    - read:jira-work
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/b483dee6-9319-490a-a10c-471fbfc283b6
